name: Rust CI

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: codexi-cli

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            ext: ""

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"

          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""

          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install musl
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --locked --target ${{ matrix.target }}

      - name: Test
        run: cargo test --locked

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ env.BIN_NAME }}${{ matrix.ext }} dist/
        shell: bash

      - name: Package
        run: |
          cd dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a ../${{ env.BIN_NAME }}-${{ matrix.target }}.zip *
          else
            tar czf ../${{ env.BIN_NAME }}-${{ matrix.target }}.tar.gz *
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            ${{ env.BIN_NAME }}-${{ matrix.target }}.tar.gz
            ${{ env.BIN_NAME }}-${{ matrix.target }}.zip
          if-no-files-found: ignore
